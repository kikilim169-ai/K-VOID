<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-VOID</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

/* NAV */
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid #222;
}
nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}
.hero h1{
  font-size:40px;
  letter-spacing:4px;
}

/* SHOP */
.container{
  text-align:center;
  padding:40px;
}

img{
  width:320px;
  border-radius:10px;
  transition:0.3s;
}
img:hover{
  transform:scale(1.05);
}

/* FORM */
select,button{
  margin:10px;
  padding:12px;
  width:220px;
  background:black;
  color:white;
  border:1px solid #333;
}

button{
  background:white;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#ccc;
}
</style>
</head>

<body>

<header>
<div>K-VOID</div>
<nav>
<a href="#home">Home</a>
<a href="#shop">Shop</a>
<a href="https://instagram.com/kvoid.co" target="_blank">Instagram</a>
</nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
<h1>ENTER THE VOID</h1>
<p>Train in silence. Built different.</p>
</section>

<!-- SHOP -->
<section class="container" id="shop">

<h2>VOID V1</h2>
<p>$20.99 USD</p>

<img id="productImage" src="obsidian_front.png">

<br>

<!-- COLOR -->
<select id="color" onchange="changeColor()">
<option value="">Select Color</option>
<option value="obsidian">OBSIDIAN VOID</option>
<option value="pale">PALE VOID</option>
<option value="electric">ELECTRIC VOID</option>
</select>

<!-- SIZE -->
<select id="size">
<option value="">Select Size</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<br>

<button onclick="toggleView()">Switch Front / Back</button>
<button onclick="buyNow()">Buy Now</button>

</section>

<script>
let currentColor = "obsidian";
let currentView = "front";

function changeColor(){
  currentColor = document.getElementById("color").value;
  currentView = "front";
  updateImage();
}

function toggleView(){
  currentView = currentView === "front" ? "back" : "front";
  updateImage();
}

function updateImage(){
  document.getElementById("productImage").src = currentColor + "_" + currentView + ".png";
}

function buyNow(){
  const size = document.getElementById("size").value;
  const colorText = document.getElementById("color").options[document.getElementById("color").selectedIndex].text;

  if(!size || !currentColor){
    alert("Please select size and color");
    return;
  }

  const message = `🔥 K-VOID ORDER
Product: VOID V1
Color: ${colorText}
Size: ${size}
Price: $20.99 USD`;

  window.open("https://wa.me/?text=" + encodeURIComponent(message));
}
</script>

</body>
</html>
